services:
  redis:
    image: redis:7

    # restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api

    # restart: unless-stopped

    depends_on:
      redis:
        condition: service_healthy

    ports:
      - "3333:3333"

    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}

    volumes:
      - ./data:/data

  worker:
    build:
      context: ./worker
      args:
        DOCKER_GID: ${DOCKER_GID}

    # restart: unless-stopped

    depends_on:
      redis:
        condition: service_healthy

    environment:
      HOST_DATA_PATH: ${HOST_DATA_PATH}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}

    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock

  tracergrind:
    build:
      context: ./tracergrind

    image: tracergrind

    volumes:
      - ./data:/data

  texttrace:
    build:
      context: ./texttrace

    image: texttrace

    volumes:
      - ./data:/data

  web:
    build:
      context: ./web

    # restart: unless-stopped

    ports:
      - "5173:5173"

    volumes:
      - ./web:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: npm run dev -- --host 0.0.0.0
